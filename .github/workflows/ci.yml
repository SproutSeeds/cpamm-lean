name: CI

on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  public-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enforce public/private boundary
        run: python3 scripts/check_public_boundary.py

  protocol-intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts
      - name: Validate protocol intake template payloads
        run: |
          set -o pipefail
          python3 scripts/intake_validate.py \
            --system-json Protocol/examples/cpamm/System.json \
            --handoff-json Protocol/examples/cpamm/HANDOFF_READY.json \
            --strict-gate \
            --out artifacts/protocol-intake.md 2>&1 | tee artifacts/protocol-intake.log
      - name: Protocol intake summary
        run: |
          {
            echo "## Protocol Intake Gate"
            echo ""
            cat artifacts/protocol-intake.md
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: protocol-intake-artifacts
          path: |
            artifacts/protocol-intake.log
            artifacts/protocol-intake.md
          if-no-files-found: warn

  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1
      - run: mkdir -p artifacts
      - name: Lean cache
        run: |
          set -o pipefail
          lake exe cache get 2>&1 | tee artifacts/lake-cache.log
      - name: Lean build
        run: |
          set -o pipefail
          lake build 2>&1 | tee artifacts/lake-build.log
      - name: Validate theorem inventory
        run: |
          set -o pipefail
          python3 scripts/validate_theorem_inventory.py 2>&1 | tee artifacts/theorem-inventory-validation.log
      - name: Lean summary
        run: |
          {
            echo "## Lean Gate"
            echo ""
            tail -n 5 artifacts/lake-build.log
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: lean-artifacts
          path: |
            artifacts/lake-*.log
            artifacts/theorem-inventory-validation.log
          if-no-files-found: warn

  solidity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: 1.5.1
      - run: mkdir -p artifacts
      - name: Validate assumption/test matrix
        run: python3 scripts/validate_assumption_matrix.py
      - name: Forge tests (human log)
        run: |
          set -o pipefail
          cd solidity
          forge test --gas-report 2>&1 | tee ../artifacts/forge-test.log
      - name: Forge tests (JSON)
        run: |
          cd solidity
          forge test --json > ../artifacts/forge-test.json
      - name: Forge coverage (summary + lcov)
        run: |
          set -o pipefail
          cd solidity
          forge coverage --report summary --report lcov 2>&1 | tee ../artifacts/forge-coverage.log
          if [[ -f lcov.info ]]; then cp lcov.info ../artifacts/lcov.info; fi
      - name: Enforce CPAMM contract coverage thresholds
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          log = Path("artifacts/forge-coverage.log").read_text()
          def parse_row(file_path: str):
              row = next((ln for ln in log.splitlines() if file_path in ln), None)
              if row is None:
                  print(f"error: {file_path} coverage row not found")
                  sys.exit(1)
              vals = re.findall(r"([0-9]+(?:\.[0-9]+)?)%", row)
              if len(vals) < 3:
                  print(f"error: could not parse coverage percentages from line: {row}")
                  sys.exit(1)
              return float(vals[0]), float(vals[1]), float(vals[2])

          targets = [
              ("src/CPAMM.sol", 56.0),
              ("src/CPAMMTokenized.sol", 53.0),
          ]

          for file_path, min_branch_cov in targets:
              line_cov, stmt_cov, branch_cov = parse_row(file_path)
              if line_cov < 100.0 or stmt_cov < 100.0 or branch_cov < min_branch_cov:
                  print(
                      f"error: coverage regression for {file_path} "
                      f"(lines={line_cov:.2f}%, statements={stmt_cov:.2f}%, branches={branch_cov:.2f}%)"
                  )
                  sys.exit(1)
              print(
                  f"coverage gate passed for {file_path} "
                  f"(lines={line_cov:.2f}%, statements={stmt_cov:.2f}%, branches={branch_cov:.2f}%)"
              )
          PY
      - name: Solidity summary
        run: |
          {
            echo "## Solidity Gate"
            echo ""
            grep -E "^Suite result:|^Ran [0-9]+ test suites" artifacts/forge-test.log || true
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: solidity-artifacts
          path: |
            artifacts/forge-test.log
            artifacts/forge-test.json
            artifacts/forge-coverage.log
            artifacts/lcov.info
          if-no-files-found: warn

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: 1.5.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .venv-security
            ~/.cache/pip
          key: ${{ runner.os }}-slither-0.11.4-${{ hashFiles('scripts/security/slither.sh') }}
          restore-keys: |
            ${{ runner.os }}-slither-0.11.4-
      - run: mkdir -p artifacts
      - name: Slither gate
        run: |
          set -o pipefail
          SLITHER_SARIF=artifacts/slither.sarif ./scripts/security/slither.sh 2>&1 | tee artifacts/slither.log
      - name: Security summary
        run: |
          {
            echo "## Security Gate"
            echo ""
            grep -E "result\(s\) found" artifacts/slither.log || true
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Slither SARIF
        if: always() && hashFiles('artifacts/slither.sarif') != ''
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: artifacts/slither.sarif
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: security-artifacts
          path: |
            artifacts/slither.log
            artifacts/slither.sarif
          if-no-files-found: warn

  strategy-tooling:
    if: ${{ vars.ENABLE_COMMERCIAL_AUTOMATION == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: mkdir -p artifacts
      - name: Validate strategy data templates
        run: |
          set -o pipefail
          python3 scripts/validate_strategy_data.py \
            --pipeline strategy/assets/crm/PIPELINE_TEMPLATE.csv \
            --kpi strategy/assets/ops/KPI_TRACKER_TEMPLATE.csv \
            --deal-input strategy/assets/contracts/DEAL_INPUT_TEMPLATE.json \
            --portal-input strategy/assets/portal/PORTAL_INPUT_TEMPLATE.json \
            --case-study-input strategy/assets/case-studies/CASE_STUDY_INPUT_TEMPLATE.json \
            2>&1 | tee artifacts/strategy-data-validation.log
      - name: Strategy tooling tests
        run: |
          set -o pipefail
          python3 -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee artifacts/strategy-tooling.log
      - name: Case-study index (template data)
        run: |
          set -o pipefail
          python3 scripts/case_study_index.py \
            --inputs strategy/assets/case-studies/CASE_STUDY_INPUT_TEMPLATE.json \
            --out artifacts/case-studies-index.md \
            --json-out artifacts/case-studies-rollup.json \
            2>&1 | tee artifacts/case-study-index.log
      - name: Case-study portal (template data)
        run: |
          set -o pipefail
          python3 scripts/case_study_pack.py \
            --input strategy/assets/case-studies/CASE_STUDY_INPUT_TEMPLATE.json \
            --out-root artifacts/case-studies
          python3 scripts/case_study_portal.py \
            --index-md artifacts/case-studies-index.md \
            --rollup-json artifacts/case-studies-rollup.json \
            --case-studies-dir artifacts/case-studies \
            --out-dir artifacts/case-study-portal \
            2>&1 | tee artifacts/case-study-portal.log
      - name: Outbound SLA gate (template data)
        run: |
          set -o pipefail
          python3 scripts/outbound_sla_gate.py \
            --pipeline strategy/assets/crm/PIPELINE_TEMPLATE.csv \
            --as-of 2026-03-01 \
            --out artifacts/outbound-sla.md \
            --json-out artifacts/outbound-sla.json \
            --strict 2>&1 | tee artifacts/outbound-sla.log
      - name: Strategy tooling summary
        run: |
          {
            echo "## Strategy Tooling Gate"
            echo ""
            tail -n 20 artifacts/strategy-tooling.log
            echo ""
            echo "### Outbound SLA"
            echo ""
            cat artifacts/outbound-sla.md
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: strategy-tooling-artifacts
          path: |
            artifacts/strategy-data-validation.log
            artifacts/strategy-tooling.log
            artifacts/case-study-index.log
            artifacts/case-studies-index.md
            artifacts/case-studies-rollup.json
            artifacts/case-study-portal.log
            artifacts/case-study-portal
            artifacts/outbound-sla.log
            artifacts/outbound-sla.md
            artifacts/outbound-sla.json
          if-no-files-found: warn

  commercial-review-package:
    if: ${{ vars.ENABLE_COMMERCIAL_AUTOMATION == 'true' }}
    runs-on: ubuntu-latest
    needs: [strategy-tooling]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: mkdir -p artifacts
      - name: Build commercial review package (template data)
        run: |
          ./scripts/commercial_review_package.sh \
            --pipeline strategy/assets/crm/PIPELINE_TEMPLATE.csv \
            --kpi strategy/assets/ops/KPI_TRACKER_TEMPLATE.csv \
            --deal-input strategy/assets/contracts/DEAL_INPUT_TEMPLATE.json \
            --portal-input strategy/assets/portal/PORTAL_INPUT_TEMPLATE.json \
            --case-study-input strategy/assets/case-studies/CASE_STUDY_INPUT_TEMPLATE.json \
            --as-of 2026-03-01 \
            --out-dir artifacts/commercial-review-package
      - name: Commercial package summary
        run: |
          {
            echo "## Commercial Review Package"
            echo ""
            echo "Generated bundle:"
            echo "- \`artifacts/commercial-review-package\`"
            echo "- \`artifacts/commercial-review-package.tar.gz\`"
            echo ""
            tail -n 20 artifacts/commercial-review-package/MANIFEST.md
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: commercial-review-package
          path: |
            artifacts/commercial-review-package
            artifacts/commercial-review-package.tar.gz
          if-no-files-found: error

  review-package:
    runs-on: ubuntu-latest
    needs: [public-boundary, protocol-intake, lean, solidity, security]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1
      - uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: 1.5.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .venv-security
            ~/.cache/pip
          key: ${{ runner.os }}-slither-0.11.4-${{ hashFiles('scripts/security/slither.sh') }}
          restore-keys: |
            ${{ runner.os }}-slither-0.11.4-
      - name: Build review package
        run: ./scripts/review_package.sh artifacts/review-package
      - name: Review package summary
        run: |
          {
            echo "## Review Package"
            echo ""
            echo "Generated bundle:"
            echo "- \`artifacts/review-package\`"
            echo "- \`artifacts/review-package.tar.gz\`"
            echo ""
            tail -n 20 artifacts/review-package/MANIFEST.md
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: review-package
          path: |
            artifacts/review-package
            artifacts/review-package.tar.gz
          if-no-files-found: error
