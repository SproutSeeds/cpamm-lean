name: CI

on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: leanprover/lean-action@c544e89643240c6b398f14a431bcdc6309e36b3e # v1
      - run: mkdir -p artifacts
      - name: Lean cache
        run: |
          set -o pipefail
          lake exe cache get 2>&1 | tee artifacts/lake-cache.log
      - name: Lean build
        run: |
          set -o pipefail
          lake build 2>&1 | tee artifacts/lake-build.log
      - name: Lean summary
        run: |
          {
            echo "## Lean Gate"
            echo ""
            tail -n 5 artifacts/lake-build.log
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: lean-artifacts
          path: artifacts/lake-*.log
          if-no-files-found: warn

  solidity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: 1.5.1
      - run: mkdir -p artifacts
      - name: Forge tests (human log)
        run: |
          set -o pipefail
          cd solidity
          forge test --gas-report 2>&1 | tee ../artifacts/forge-test.log
      - name: Forge tests (JSON)
        run: |
          cd solidity
          forge test --json > ../artifacts/forge-test.json
      - name: Forge coverage (summary + lcov)
        run: |
          set -o pipefail
          cd solidity
          forge coverage --report summary --report lcov 2>&1 | tee ../artifacts/forge-coverage.log
          if [[ -f lcov.info ]]; then cp lcov.info ../artifacts/lcov.info; fi
      - name: Enforce CPAMM coverage threshold
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          log = Path("artifacts/forge-coverage.log").read_text()
          line = next((ln for ln in log.splitlines() if "src/CPAMM.sol" in ln), None)
          if line is None:
              print("error: src/CPAMM.sol coverage row not found")
              sys.exit(1)

          vals = re.findall(r"([0-9]+(?:\.[0-9]+)?)%", line)
          if len(vals) < 3:
              print(f"error: could not parse coverage percentages from line: {line}")
              sys.exit(1)

          line_cov = float(vals[0])
          stmt_cov = float(vals[1])
          branch_cov = float(vals[2])
          min_branch_cov = 56.0
          if line_cov < 100.0 or stmt_cov < 100.0 or branch_cov < min_branch_cov:
              print(
                  f"error: coverage regression for src/CPAMM.sol "
                  f"(lines={line_cov:.2f}%, statements={stmt_cov:.2f}%, branches={branch_cov:.2f}%)"
              )
              sys.exit(1)

          print(
              f"coverage gate passed for src/CPAMM.sol "
              f"(lines={line_cov:.2f}%, statements={stmt_cov:.2f}%, branches={branch_cov:.2f}%)"
          )
          PY
      - name: Solidity summary
        run: |
          {
            echo "## Solidity Gate"
            echo ""
            grep -E "^Suite result:|^Ran [0-9]+ test suites" artifacts/forge-test.log || true
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: solidity-artifacts
          path: |
            artifacts/forge-test.log
            artifacts/forge-test.json
            artifacts/forge-coverage.log
            artifacts/lcov.info
          if-no-files-found: warn

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: 1.5.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .venv-security
            ~/.cache/pip
          key: ${{ runner.os }}-slither-0.11.4-${{ hashFiles('scripts/security/slither.sh') }}
          restore-keys: |
            ${{ runner.os }}-slither-0.11.4-
      - run: mkdir -p artifacts
      - name: Slither gate
        run: |
          set -o pipefail
          SLITHER_SARIF=artifacts/slither.sarif ./scripts/security/slither.sh 2>&1 | tee artifacts/slither.log
      - name: Security summary
        run: |
          {
            echo "## Security Gate"
            echo ""
            grep -E "result\(s\) found" artifacts/slither.log || true
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Slither SARIF
        if: always() && hashFiles('artifacts/slither.sarif') != ''
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
        with:
          sarif_file: artifacts/slither.sarif
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: security-artifacts
          path: |
            artifacts/slither.log
            artifacts/slither.sarif
          if-no-files-found: warn
